<!DOCTYPE html>
<html lang="th">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายงานผลงานแพทย์ - โรงพยาบาลโคกศรีสุพรรณ</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sarabun:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <!-- App Shell -->
    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <div class="logo-icon">🏥</div>
                <div class="logo-text">
                    <span class="logo-title">รายงานผลงานแพทย์</span>
                    <span class="logo-sub">HOSxP Report</span>
                </div>
            </div>

            <div class="sidebar-section">
                <div class="section-label">ช่วงเวลา (ปีงบประมาณ)</div>
                <div class="form-group">
                    <label>ปีงบประมาณ</label>
                    <select id="targetFY" class="form-control"></select>
                </div>
                <button class="btn-primary" id="loadBtn" onclick="loadReport()">
                    <span>🔄</span> โหลดรายงาน
                </button>
            </div>

            <div class="sidebar-section">
                <div class="section-label">ลำดับแพทย์ <span class="hint">(ลากเพื่อเรียง)</span></div>
                <div id="doctorList" class="doctor-list">
                    <div class="loading-text">กำลังโหลด...</div>
                </div>
                <button class="btn-secondary" onclick="applyOrder()">
                    <span>✅</span> ใช้ลำดับนี้
                </button>
            </div>

            <div class="sidebar-actions">
                <button class="btn-print" onclick="printReport()">🖨️ พิมพ์รายงาน</button>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Top bar -->
            <div class="topbar">
                <div class="topbar-title">
                    <h1>รายงานการสรุปเวชระเบียนผู้ป่วย ใน</h1>
                    <p>โรงพยาบาลโคกศรีสุพรรณ จังหวัดสกลนคร</p>
                </div>
                <div class="topbar-meta" id="reportMeta">
                    <span id="reportDateLabel">กรุณาเลือกช่วงเวลา</span>
                </div>
            </div>

            <!-- Status bar -->
            <div class="status-bar" id="statusBar">
                <span id="statusText">⏳ กรุณากดโหลดรายงาน</span>
            </div>

            <!-- Report container -->
            <div class="report-container" id="reportContainer">
                <div class="empty-state">
                    <div class="empty-icon">📊</div>
                    <p>กดปุ่ม <strong>โหลดรายงาน</strong> เพื่อแสดงข้อมูล</p>
                </div>
            </div>

            <!-- Ward Report Container -->
            <div class="ward-report-container" id="wardReportContainer">
                <!-- ตารางข้อมูลรายเดือนจะมาแทรกตรงนี้ -->
            </div>
        </main>
    </div>

    <!-- Sortable.js CDN -->
    <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
